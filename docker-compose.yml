services:
  db:
    image: postgres:18-alpine
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  node:
    build: .
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    depends_on: 
      - db
  
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node
  
