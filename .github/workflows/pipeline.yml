name: CI/CD pipeline

on:
    push:
        branches: [ main ]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
            - name: Setup Node environment
              uses: actions/setup-node@v4
              with:
                node-version: lts/*
            - name: Install dependencies
              run: npm ci --legacy-peer-deps
            - name: Run ESLint
              run: npm run lint 
    
    test:
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
            - name: Setup Node environment
              uses: actions/setup-node@v4
              with:
                node-version: lts/*
            - name: Install dependencies
              run: npm ci --legacy-peer-deps
            - name: Run tests
              run: npm run test
        