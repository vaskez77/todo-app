<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #c8f135;
      --text:     #e8e8e8;
      --muted:    #555;
      --done:     #333;
      --radius:   4px;
      --font:     'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 16px 96px;
    }

    /* ── header ── */
    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
    }

    header h1 span { color: var(--accent); }

    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── input row ── */
    .input-row {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .input-row button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0d0d0d;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 12px 20px;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover  { opacity: 0.85; }
    .input-row button:active { transform: scale(0.97); }

    /* ── filters ── */
    .filters {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .filters button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.72rem;
      letter-spacing: 1px;
      padding: 6px 12px;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .filters button.active,
    .filters button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── list ── */
    #todo-list {
      width: 100%;
      max-width: 640px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .todo-item {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      gap: 12px;
      padding: 14px 16px;
      animation: slideIn 0.18s ease;
      transition: border-color 0.15s;
    }

    .todo-item:hover { border-color: #3a3a3a; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.completed .todo-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    /* custom checkbox */
    .todo-check {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .todo-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .todo-check:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: 2px solid #0d0d0d;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .todo-title {
      flex: 1;
      font-size: 0.875rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .todo-delete {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    .todo-delete:hover { color: #e05252; }

    /* ── status bar ── */
    .status-bar {
      width: 100%;
      max-width: 640px;
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-bar button {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .status-bar button:hover { color: #e05252; }

    /* ── empty state ── */
    .empty {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 1px;
      padding: 40px 0;
      text-align: center;
      text-transform: uppercase;
      width: 100%;
      max-width: 640px;
    }

    /* ── toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.78rem;
      letter-spacing: 0.5px;
      padding: 10px 20px;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s;
      opacity: 0;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.error { border-color: #e05252; color: #e05252; }

    /* ── loading spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>TODO<span>.</span></h1>
    <p>connected to api</p>
  </header>

  <div class="input-row">
    <input type="text" id="new-todo" placeholder="add a task..." maxlength="200" />
    <button id="add-btn">+ Add</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="active">Active</button>
    <button data-filter="completed">Done</button>
  </div>

  <ul id="todo-list"></ul>

  <div class="status-bar">
    <span id="count-label">0 items left</span>
    <button id="clear-btn">Clear completed</button>
  </div>

  <div id="toast"></div>

  <script>
    // ── config ─────────────────────────────────────────────────────────────
    // During local dev, set this to http://localhost:3000
    // In production this is injected at build time via your CI/CD pipeline
    // using `sed` or `envsubst` before uploading to S3.
    const API_BASE = window.ENV_API_URL || 'http://localhost:3000';

    // ── state ───────────────────────────────────────────────────────────────
    let todos = [];
    let filter = 'all';

    // ── dom refs ────────────────────────────────────────────────────────────
    const list      = document.getElementById('todo-list');
    const input     = document.getElementById('new-todo');
    const addBtn    = document.getElementById('add-btn');
    const clearBtn  = document.getElementById('clear-btn');
    const countLbl  = document.getElementById('count-label');
    const toast     = document.getElementById('toast');
    let toastTimer;

    // ── toast ───────────────────────────────────────────────────────────────
    function showToast(msg, isError = false) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = isError ? 'show error' : 'show';
      toastTimer = setTimeout(() => { toast.className = ''; }, 2800);
    }

    // ── api helpers ─────────────────────────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}/api/todos${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // ── render ───────────────────────────────────────────────────────────────
    function render() {
      const visible = todos.filter(t => {
        if (filter === 'active')    return !t.completed;
        if (filter === 'completed') return t.completed;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = '';
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = filter === 'completed' ? 'no completed tasks' : 'nothing to do 🎉';
        list.appendChild(empty);
      } else {
        list.innerHTML = visible.map(t => `
          <li class="todo-item ${t.completed ? 'completed' : ''}" data-id="${t.id}">
            <input type="checkbox" class="todo-check" ${t.completed ? 'checked' : ''} />
            <span class="todo-title">${escHtml(t.title)}</span>
            <button class="todo-delete" title="delete">✕</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.completed).length;
      countLbl.textContent = `${remaining} item${remaining !== 1 ? 's' : ''} left`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── load ─────────────────────────────────────────────────────────────────
    async function loadTodos() {
      list.innerHTML = '<div class="spinner"></div>';
      try {
        todos = await apiFetch('');
        render();
      } catch (err) {
        list.innerHTML = '';
        showToast('failed to load todos', true);
      }
    }

    // ── add ───────────────────────────────────────────────────────────────────
    async function addTodo() {
      const title = input.value.trim();
      if (!title) return;
      addBtn.disabled = true;
      try {
        const created = await apiFetch('', {
          method: 'POST',
          body: JSON.stringify({ title }),
        });
        todos.unshift(created);
        input.value = '';
        render();
        showToast('task added');
      } catch (err) {
        showToast(err.message, true);
      } finally {
        addBtn.disabled = false;
      }
    }

    // ── toggle ────────────────────────────────────────────────────────────────
    async function toggleTodo(id, completed) {
      try {
        const updated = await apiFetch(`/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ completed }),
        });
        todos = todos.map(t => t.id === updated.id ? updated : t);
        render();
      } catch (err) {
        showToast(err.message, true);
        render(); // revert checkbox visually
      }
    }

    // ── delete ────────────────────────────────────────────────────────────────
    async function deleteTodo(id) {
      try {
        await apiFetch(`/${id}`, { method: 'DELETE' });
        todos = todos.filter(t => t.id !== id);
        render();
        showToast('task removed');
      } catch (err) {
        showToast(err.message, true);
      }
    }

    // ── clear completed ───────────────────────────────────────────────────────
    async function clearCompleted() {
      const completed = todos.filter(t => t.completed);
      if (completed.length === 0) return;
      try {
        await Promise.all(completed.map(t => apiFetch(`/${t.id}`, { method: 'DELETE' })));
        todos = todos.filter(t => !t.completed);
        render();
        showToast(`cleared ${completed.length} task${completed.length !== 1 ? 's' : ''}`);
      } catch (err) {
        showToast(err.message, true);
        await loadTodos();
      }
    }

    // ── events ─────────────────────────────────────────────────────────────────
    addBtn.addEventListener('click', addTodo);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    list.addEventListener('change', e => {
      if (e.target.classList.contains('todo-check')) {
        const id = +e.target.closest('.todo-item').dataset.id;
        toggleTodo(id, e.target.checked);
      }
    });

    list.addEventListener('click', e => {
      if (e.target.classList.contains('todo-delete')) {
        const id = +e.target.closest('.todo-item').dataset.id;
        deleteTodo(id);
      }
    });

    clearBtn.addEventListener('click', clearCompleted);

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    // ── init ────────────────────────────────────────────────────────────────────
    loadTodos();
  </script>
</body>
</html>
